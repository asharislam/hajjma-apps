name: Build Android APK

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'mobile_app/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install deps
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mobile_app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        working-directory: mobile_app/android/app/build/outputs/apk/debug
        run: |
          VERSION=$(node -p "require('../../../../../../package.json').version")
          mv app-debug.apk Hajjma-${VERSION}.apk
          ls -la

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hajjma-android
          path: mobile_app/android/app/build/outputs/apk/debug/Hajjma-*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile_app/android/app/build/outputs/apk/debug/Hajjma-*.apk
          fail_on_unmatched_files: true
