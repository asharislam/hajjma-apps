name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'desktop_app/**'
      - '.github/workflows/windows-exe.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install

      - name: Build NSIS installer
        env:
          # Skip code signing on CI (no cert yet). Suppresses electron-builder cert prompts.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build:installer

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: HajjmaSetup-windows
          path: desktop_app/dist/HajjmaSetup-*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop_app/dist/HajjmaSetup-*.exe
          fail_on_unmatched_files: true
